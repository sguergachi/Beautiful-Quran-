<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#FAF3E8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="A calm, paper-simple Quran reader. Every word lights up in time with the reciter."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="fonts.css" />
    <title>Beautiful Quran</title>
    <script>
      document.documentElement.classList.add('js')
      /**
       * Stale-shell heal for mobile browsers.
       *
       * A previous service worker could serve a cached index.html that still
       * pointed at deleted hashed JS/CSS after a Pages deploy. The module
       * 404 left #root empty. Wipe every worker + Cache API entry and reload
       * once so the network-only shell can take over.
       *
       * Bump HEAL_KEY whenever the heal contract changes so phones that
       * already attempted an older heal can try again.
       */
      ;(function () {
        var HEAL_KEY = 'bq-sw-heal-v6'
        var healing = false

        function heal(reason) {
          if (healing) return
          if (!('serviceWorker' in navigator)) return
          try {
            if (sessionStorage.getItem(HEAL_KEY)) return
            sessionStorage.setItem(HEAL_KEY, reason || '1')
          } catch (e) {
            /* private mode */
          }
          healing = true
          Promise.resolve()
            .then(function () {
              return navigator.serviceWorker.getRegistrations()
            })
            .then(function (regs) {
              return Promise.all(
                regs.map(function (r) {
                  return r.unregister()
                }),
              )
            })
            .then(function () {
              if (!window.caches) return
              return caches.keys().then(function (keys) {
                return Promise.all(
                  keys.map(function (k) {
                    return caches.delete(k)
                  }),
                )
              })
            })
            .then(function () {
              location.reload()
            })
            .catch(function () {
              location.reload()
            })
        }

        // Hashed module / stylesheet 404 from a poisoned shell.
        window.addEventListener(
          'error',
          function (e) {
            var t = e && e.target
            if (!t) return
            var tag = t.tagName
            if (tag === 'SCRIPT' || tag === 'LINK') heal('asset-error')
          },
          true,
        )

        // Empty root after a short wait (module never ran).
        window.addEventListener('load', function () {
          window.setTimeout(function () {
            var root = document.getElementById('root')
            if (!root || root.childElementCount > 0) return
            heal('empty-root')
          }, 1500)
        })
      })()
    </script>
    <script type="module" crossorigin src="/Beautiful-Quran-/app/assets/index-DaosXOqn.js"></script>
    <link rel="stylesheet" crossorigin href="/Beautiful-Quran-/app/assets/index-Bvj7sTIG.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>

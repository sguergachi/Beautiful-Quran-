name: Web

on:
  workflow_dispatch:
  push:
    paths:
      - 'web/**'
      - 'data/quran.db'
      - 'docs/**'
      - '.github/workflows/web.yml'
  pull_request:
    paths:
      - 'web/**'
      - 'data/quran.db'
      - 'docs/**'
      - '.github/workflows/web.yml'

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Verify canonical and built Quran database
        run: test -s ../data/quran.db && test -s dist/quran.db

  build-pages:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Stage marketing site
        run: |
          mkdir -p _site
          cp -R docs/. _site/
      - name: Build reader into Pages site
        working-directory: web
        run: npm run build:pages
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy-pages:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/master'
    needs: build-pages
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify bundled Quran database asset
        run: test -f app/src/main/assets/quran.db

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      # Restore the store keystore when the secret is configured; without it
      # the build falls back to the debug keystore (see app/build.gradle.kts),
      # so CI keeps producing installable APKs either way.
      - name: Restore release keystore (if configured)
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "Release keystore restored."
          else
            echo "No RELEASE_KEYSTORE_BASE64 secret; signing with debug keystore."
          fi

      # Ship the R8-optimized release build: minified, resource-shrunk and
      # non-debuggable — this is what makes it feel native-fast on device.
      - name: Assemble APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk BeautifulQuran.apk

      - uses: actions/upload-artifact@v4
        with:
          name: BeautifulQuran-apk
          path: BeautifulQuran.apk

      # Only master owns the rolling "latest" release. Feature-branch builds still
      # run tests + assembleRelease and upload the APK artifact; they must not
      # contend for the shared tag (concurrent delete/create races fail CI with
      # HTTP 422 "Release.tag_name already exists" even when tests passed).
      - name: Publish APK to "latest" release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Retry a few times: two master pushes can still race on the tag.
          for attempt in 1 2 3; do
            gh release delete latest --cleanup-tag --yes || true
            if gh release create latest BeautifulQuran.apk \
              --prerelease \
              --title "Beautiful Quran — latest build" \
              --notes "Debug-signed APK built from ${{ github.sha }}. Download on your Android phone and install (allow installs from your browser when prompted)."; then
              exit 0
            fi
            echo "Release publish attempt $attempt failed; retrying…"
            sleep $((attempt * 2))
          done
          echo "Failed to publish latest release after retries (APK is still available as a workflow artifact)."
          exit 1

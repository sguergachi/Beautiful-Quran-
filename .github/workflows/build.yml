name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify bundled Quran database asset
        run: python3 - <<'PY'
          from pathlib import Path
          import sqlite3

          db_path = Path("app/src/main/assets/quran.db")
          if not db_path.is_file():
              raise SystemExit("missing bundled database: app/src/main/assets/quran.db")

          with sqlite3.connect(db_path) as db:
              checks = {
                  "surahs": 114,
                  "ayahs": 6236,
              }
              for table, expected in checks.items():
                  actual = db.execute(f"select count(*) from {table}").fetchone()[0]
                  if actual != expected:
                      raise SystemExit(f"{table}: expected {expected}, got {actual}")
        PY

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      # Ship the R8-optimized release build: minified, resource-shrunk and
      # non-debuggable — this is what makes it feel native-fast on device.
      - name: Assemble APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk BeautifulQuran.apk

      - uses: actions/upload-artifact@v4
        with:
          name: BeautifulQuran-apk
          path: BeautifulQuran.apk

      - name: Publish APK to "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest BeautifulQuran.apk \
            --prerelease \
            --title "Beautiful Quran — latest build" \
            --notes "Debug-signed APK built from ${{ github.sha }}. Download on your Android phone and install (allow installs from your browser when prompted)."

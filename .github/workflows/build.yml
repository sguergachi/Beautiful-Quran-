name: Build

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Verify bundled Quran database asset
        run: test -f app/src/main/assets/quran.db

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      # Ship the R8-optimized release build: minified, resource-shrunk and
      # non-debuggable — this is what makes it feel native-fast on device.
      - name: Assemble APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk BeautifulQuran.apk

      - uses: actions/upload-artifact@v4
        with:
          name: BeautifulQuran-apk
          path: BeautifulQuran.apk

      - name: Publish APK to "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          gh release create latest BeautifulQuran.apk \
            --prerelease \
            --title "Beautiful Quran — latest build" \
            --notes "Debug-signed APK built from ${{ github.sha }}. Download on your Android phone and install (allow installs from your browser when prompted)."

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta name="theme-color" content="#FAF3E8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta
      name="description"
      content="A calm, paper-simple Quran reader. Every word lights up in time with the reciter."
    />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="stylesheet" href="fonts.css" />
    <title>Beautiful Quran</title>
    <script>
      document.documentElement.classList.add('js')
      // If a stale service-worker shell left us with an empty root (cached
      // index pointing at deleted hashed assets), wipe the worker + caches
      // and reload once so the network-first shell can take over.
      window.addEventListener('load', () => {
        window.setTimeout(() => {
          const root = document.getElementById('root')
          if (!root || root.childElementCount > 0) return
          if (!('serviceWorker' in navigator)) return
          const flag = 'bq-sw-heal'
          if (sessionStorage.getItem(flag)) return
          sessionStorage.setItem(flag, '1')
          void (async () => {
            const regs = await navigator.serviceWorker.getRegistrations()
            await Promise.all(regs.map((r) => r.unregister()))
            if (window.caches) {
              const keys = await caches.keys()
              await Promise.all(keys.map((k) => caches.delete(k)))
            }
            location.reload()
          })()
        }, 3500)
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
